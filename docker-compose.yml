# Local MongoDB for API development (Prisma).
# Usage: docker compose up -d
# Then set server/.env DATABASE_URL (see server/.env.example)

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - shaaz_mongodata:/data/db

volumes:
  shaaz_mongodata:
