name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build client
        run: npm run build --workspace=client
        env:
          # Use Repository secret OR Variable named VITE_API_URL (secret wins if both are set)
          VITE_API_URL: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}

      - name: SPA fallback for GitHub Pages
        run: cp client/dist/index.html client/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      # Always show your live site in the Actions deployment summary (output from deploy-pages can be empty before custom domain is wired in GitHub settings).
      url: https://www.shaazdriving.com
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
