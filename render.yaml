# Render Blueprint — https://render.com/docs/blueprint-spec
# Create MongoDB Atlas (or other MongoDB) and set DATABASE_URL on the service.

services:
  - type: web
    name: shaaz-driving-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run db:generate --workspace=server && npm run build --workspace=server
    startCommand: cd server && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
